name: Deploy to spacesorganizers.com

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_fijUeVQzjA094llkoncaYLFj
          vercel-project-id: prj_xv7cVDjV4AcJKLP7HpxCsP2WRHni
          vercel-args: '--prod'
          working-directory: ./

      - name: Alias to custom domains
        run: |
          DEPLOYMENT_URL="${{ steps.deploy.outputs.preview-url }}"
          npx vercel alias "$DEPLOYMENT_URL" spacesorganizers.com --token ${{ secrets.VERCEL_TOKEN }}
          npx vercel alias "$DEPLOYMENT_URL" www.spacesorganizers.com --token ${{ secrets.VERCEL_TOKEN }}
          npx vercel alias "$DEPLOYMENT_URL" spaceorganizers.vercel.app --token ${{ secrets.VERCEL_TOKEN }}
          echo "✅ Deployed and aliased to spacesorganizers.com"
